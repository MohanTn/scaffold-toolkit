name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build # before test — packages/core's tests exercise dist/cli.js
      - run: npm run lint
      - run: npm test

  templates-dotnet-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: npm ci
      - run: npm run build --workspace=packages/core
      - run: node packages/templates-dotnet/tools/check-guardrails.mjs
      - run: node packages/templates-dotnet/tools/validate-build.mjs
      - run: node packages/templates-dotnet/v8-controller-storemedia-v2/tools/validate-build.mjs

  templates-node-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/core
      - run: node packages/templates-node/tools/check-guardrails.mjs
      - run: node packages/templates-node/tools/validate-build.mjs

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, templates-dotnet-build-check, templates-node-build-check]
    runs-on: ubuntu-latest
    concurrency:
      group: publish
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Bump version
        run: |
          git checkout -- package-lock.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          npm version patch --workspaces --include-workspace-root=false --no-git-tag-version
          NEW_VERSION=$(node -p "require('./packages/core/package.json').version")
          git commit -am "chore(release): v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin HEAD:main --follow-tags
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspaces
